# RealPoint — local Supabase (Docker via `supabase start`)
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "realpoint"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "realpoint://",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false
# Local: email+password works without Mailpit. Magic links: http://127.0.0.1:54324

[auth.sms]
enable_signup = true
enable_confirmations = true
# Test OTP (requires Supabase CLI v2.80+; upgrade: brew upgrade supabase)
[auth.sms.test_otp]
9876543210 = "123456"
919876543210 = "123456"
4152127777 = "123456"

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[analytics]
enabled = false
